# FRED series catalog
# Each entry defines a series ID and metadata for the download + visualization pipeline.
# Add or remove series here; refresh.py reads this file at runtime.

[defaults]
frequency = "q"          # default observation frequency filter (d/w/m/q/sa/a/wef/weth/wew/wetu/wem/wesu/wesa/bwew/bwem)
units = "lin"            # default units transform (lin/chg/ch1/pch/pc1/pca/cca/log)
vintage_dates = []       # leave empty to fetch latest vintage

[[series]]
id = "GDP"
title = "Gross Domestic Product"
category = "national_accounts"
frequency = "q"
units = "lin"

[[series]]
